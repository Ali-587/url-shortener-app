name: Deploy Application

on:
  push:
    branches:
      - dev
      - prod
    paths:
      - "backend/**"
      - "frontend/**"
      - ".github/workflows/deploy-app.yml"

  workflow_dispatch:
    inputs:
      environment:
        description: "Target Environment"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - prod

permissions:
  id-token: write
  contents: read

jobs:
  setup-env:
    name: Determine Environment
    runs-on: ubuntu-latest
    outputs:
      TARGET_ENV: ${{ steps.set-env.outputs.TARGET_ENV }}
    steps:
      - name: Set Environment Name
        id: set-env
        run: |
          if [[ "${{ github.event_name }}" == 'workflow_dispatch' ]]; then
            echo "TARGET_ENV=${{ github.event.inputs.environment }}" >> $GITHUB_OUTPUT
          else
            echo "TARGET_ENV=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

  deploy-backend:
    name: Deploy Lambda Backend
    runs-on: ubuntu-latest
    needs: setup-env
    environment: ${{ needs.setup-env.outputs.TARGET_ENV }}

    steps:
      - name: Checkout app repo
        uses: actions/checkout@v4

      - name: Configure AWS credentials using OIDC role
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_APP_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install backend dependencies
        working-directory: backend
        run: npm install --omit=dev

      - name: Package Lambda code
        working-directory: backend
        run: |
          zip -r ../lambda.zip .

      - name: Update Lambda function code
        run: |
          aws lambda update-function-code \
            --function-name "${{ vars.LAMBDA_FUNCTION_NAME }}" \
            --zip-file fileb://lambda.zip

      - name: Wait for Lambda update
        run: |
          aws lambda wait function-updated \
            --function-name "${{ vars.LAMBDA_FUNCTION_NAME }}"

  deploy-frontend:
    name: Deploy Frontend to S3 and CloudFront
    runs-on: ubuntu-latest
    needs: [setup-env, deploy-backend]
    environment: ${{ needs.setup-env.outputs.TARGET_ENV }}

    steps:
      - name: Checkout app repo
        uses: actions/checkout@v4

      - name: Configure AWS credentials using OIDC role
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_APP_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Upload frontend to S3
        run: |
          aws s3 sync frontend/ s3://${{ vars.FRONTEND_BUCKET_NAME }} --delete

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}" \
            --paths "/*"